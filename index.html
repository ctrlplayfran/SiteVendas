<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybridbots — Studio Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CustomEase.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --fg: #f0ece4;
    --accent: #c8b89a;
    --muted: #2a2a2a;
    --strip-w: calc(100vw / 6);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  /* ── Custom Cursor ── */
  #cursor {
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    mix-blend-mode: difference;
  }
  #cursor-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--fg);
    position: absolute;
    transform: translate(-50%, -50%);
    transition: width .2s, height .2s;
  }
  #cursor-ring {
    width: 40px; height: 40px;
    border: 1px solid rgba(240,236,228,.4);
    border-radius: 50%;
    position: absolute;
    transform: translate(-50%, -50%);
    transition: width .3s, height .3s, opacity .3s, border-color .3s;
  }
  #cursor-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--fg);
    padding: 4px 10px;
    border-radius: 20px;
    position: absolute;
    transform: translate(-50%, 28px);
    white-space: nowrap;
    opacity: 0;
    transition: opacity .2s;
  }
  body.hovering-strip #cursor-dot { width: 4px; height: 4px; }
  body.hovering-strip #cursor-ring { width: 80px; height: 80px; opacity: 0; }
  body.hovering-strip #cursor-label { opacity: 1; }

  /* ── Header ── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 32px 40px;
    pointer-events: none;
    mix-blend-mode: exclusion;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: .2em;
    color: var(--fg);
  }
  /* Menu estilizado como botões */
  .nav-items {
    display: flex; gap: 32px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; letter-spacing: .2em;
    text-transform: uppercase;
    list-style: none;
    pointer-events: all;
  }
  .nav-items li {
    cursor: none;
    opacity: .6;
    transition: opacity .2s;
    position: relative;
    padding: 4px 0;
  }
  .nav-items li::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 1px;
    background: var(--fg);
    transition: width 0.3s ease, left 0.3s ease;
  }
  .nav-items li:hover {
    opacity: 1;
  }
  .nav-items li:hover::after {
    width: 100%;
    left: 0;
  }
  /* Para o carrinho, manter o contador */
  #cart-count {
    margin-left: 4px;
    font-weight: 400;
    color: var(--accent);
  }

  /* ── Center Title ── */
  #center-title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 50;
    pointer-events: none;
    text-align: center;
    mix-blend-mode: exclusion;
  }
  #center-title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 10vw, 130px);
    letter-spacing: -.01em;
    line-height: .9;
    color: var(--fg);
  }
  #center-title .sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: .4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 14px;
  }
  .char { display: inline-block; }

  /* ── Strips Container ── */
  #strips {
    position: fixed; inset: 0;
    display: flex;
  }

  /* ── Individual Strip ── */
  .strip {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: none;
    border-right: 1px solid rgba(240,236,228,.06);
    transition: flex .7s cubic-bezier(.76,0,.24,1);
  }
  .strip:last-child { border-right: none; }

  /* Hover no desktop: imagem colorida e mais opaca */
  .strip:hover {
    flex: 2.5;
  }
  .strip:hover .strip-img {
    opacity: 0.9;
    filter: grayscale(0) brightness(1);
    transform: scale(1);
  }
  .strip:hover .strip-num {
    opacity: 1;
    color: var(--accent);
  }
  .strip:hover .strip-label {
    opacity: 1;
    transform: translateY(0);
  }
  .strip:hover .strip-overlay {
    opacity: 0.15;
  }
  .strip:hover .strip-canvas {
    opacity: 1;
  }

  /* Estado ativo no mobile (simula hover) */
  .strip.touch-hover {
    flex: 2.5;
  }
  .strip.touch-hover .strip-img {
    opacity: 0.9;
    filter: grayscale(0) brightness(1);
    transform: scale(1);
  }
  .strip.touch-hover .strip-num {
    opacity: 1;
    color: var(--accent);
  }
  .strip.touch-hover .strip-label {
    opacity: 1;
    transform: translateY(0);
  }
  .strip.touch-hover .strip-overlay {
    opacity: 0.15;
  }
  .strip.touch-hover .strip-canvas {
    opacity: 1;
  }

  /* strip canvas (WebGL) */
  .strip-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0.8;
    transition: opacity .5s;
    z-index: 1;
  }

  /* imagens locais - P&B e transparentes */
  .strip-img {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0.25;
    transition: opacity .5s, transform .8s cubic-bezier(.76,0,.24,1), filter .5s;
    transform: scale(1.02);
    filter: grayscale(1) brightness(0.8) contrast(1.1);
    z-index: 2;
  }

  .strip-overlay {
    position: absolute; inset: 0;
    background: var(--bg);
    opacity: 0.2;
    transition: opacity .5s;
    z-index: 3;
    pointer-events: none;
  }

  .strip-fill {
    position: absolute; inset: 0;
    transition: opacity .5s;
    z-index: 0;
  }

  .strip-num {
    position: absolute;
    top: 32px; left: 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; letter-spacing: .25em;
    text-transform: uppercase;
    opacity: 0.6;
    transition: opacity .4s, color .4s;
    z-index: 10;
    color: var(--fg);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .strip-label {
    position: absolute;
    bottom: 40px; left: 24px; right: 24px;
    z-index: 10;
    opacity: 0.9;
    transform: translateY(0);
    transition: opacity .4s .1s, transform .4s .1s;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
  }
  .strip-label h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 2.5vw, 36px);
    letter-spacing: .04em;
    line-height: 1;
    color: var(--fg);
  }
  .strip-label p {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 6px;
    opacity: 0.9;
  }

  /* ── Expanded View ── */
  #expanded-view {
    position: fixed; inset: 0;
    z-index: 200;
    background: var(--bg);
    opacity: 0;
    pointer-events: none;
    display: flex;
  }
  #expanded-view.active { pointer-events: all; }
  #exp-image {
    flex: 1;
    background-size: cover;
    background-position: center;
    filter: grayscale(0);
    transition: filter 0.5s;
  }
  #exp-info {
    width: min(480px, 38vw);
    padding: 80px 48px;
    display: flex; flex-direction: column; justify-content: flex-end;
    border-left: 1px solid rgba(240,236,228,.08);
  }
  #exp-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    opacity: 0;
  }
  #exp-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 5vw, 80px);
    line-height: .9;
    color: var(--fg);
    overflow: hidden;
  }
  #exp-title span { display: block; transform: translateY(100%); }
  #exp-category {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 18px;
    opacity: 0;
  }
  #exp-desc {
    font-family: 'Barlow', sans-serif;
    font-size: 14px; line-height: 1.7;
    color: rgba(240,236,228,.55);
    margin-top: 24px;
    opacity: 0;
  }
  #exp-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    margin-top: 24px;
    opacity: 0;
  }
  #exp-add-to-cart {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--fg);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: .2em;
    text-transform: uppercase;
    padding: 16px 32px;
    margin-top: 32px;
    cursor: none;
    transition: background .3s, color .3s;
    opacity: 0;
    width: fit-content;
  }
  #exp-add-to-cart:hover {
    background: var(--accent);
    color: var(--bg);
  }
  #exp-close {
    position: absolute; top: 36px; right: 40px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--fg);
    cursor: none;
    opacity: .5;
    transition: opacity .2s;
  }
  #exp-close:hover { opacity: 1; }

  /* ── Carrinho Sidebar ── */
  #cart-sidebar {
    position: fixed;
    top: 0; right: 0;
    width: min(400px, 85vw);
    height: 100vh;
    background: var(--bg);
    border-left: 1px solid rgba(240,236,228,.1);
    z-index: 300;
    transform: translateX(100%);
    transition: transform .6s cubic-bezier(.76,0,.24,1);
    display: flex;
    flex-direction: column;
    padding: 40px 24px;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
  }
  #cart-sidebar.open {
    transform: translateX(0);
  }
  #cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: .2em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(240,236,228,.1);
    padding-bottom: 20px;
  }
  #cart-close {
    cursor: none;
    opacity: .5;
    transition: opacity .2s;
  }
  #cart-close:hover { opacity: 1; }
  #cart-items {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 20px;
  }
  .cart-item {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(240,236,228,.05);
    padding-bottom: 16px;
  }
  .cart-item-img {
    width: 60px;
    height: 60px;
    background-size: cover;
    background-position: center;
    filter: grayscale(0.5);
  }
  .cart-item-info {
    flex: 1;
  }
  .cart-item-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: .05em;
  }
  .cart-item-category {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--accent);
    margin: 4px 0;
  }
  .cart-item-price {
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: var(--fg);
  }
  .cart-item-remove {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: .15em;
    color: rgba(240,236,228,.3);
    cursor: none;
    transition: color .2s;
    margin-top: 4px;
    display: inline-block;
  }
  .cart-item-remove:hover {
    color: #ff5e5e;
  }
  #cart-footer {
    border-top: 1px solid rgba(240,236,228,.1);
    padding-top: 20px;
  }
  #cart-total {
    display: flex;
    justify-content: space-between;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    letter-spacing: .1em;
    margin-bottom: 24px;
  }
  #cart-checkout {
    background: var(--accent);
    border: none;
    color: var(--bg);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: .2em;
    text-transform: uppercase;
    padding: 16px 0;
    width: 100%;
    cursor: none;
    transition: opacity .3s;
  }
  #cart-checkout:hover {
    opacity: 0.8;
  }
  #cart-empty {
    font-family: 'Barlow', sans-serif;
    color: rgba(240,236,228,.3);
    text-align: center;
    margin-top: 40px;
  }

  /* ── Progress Bar ── */
  #progress {
    position: fixed; bottom: 0; left: 0;
    height: 1px; width: 0;
    background: var(--accent);
    z-index: 400;
    transition: none;
  }

  /* ── Loader ── */
  #loader {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
  }
  #loader-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px; color: var(--fg);
  }
  #loader-bar-wrap {
    width: 200px; height: 1px;
    background: rgba(240,236,228,.12);
  }
  #loader-bar {
    height: 100%;
    background: var(--accent);
    width: 0;
  }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div id="loader-num">0</div>
  <div id="loader-bar-wrap"><div id="loader-bar"></div></div>
</div>

<!-- Custom Cursor -->
<div id="cursor">
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <div id="cursor-label">Ver Projeto</div>
</div>

<!-- Header -->
<header>
  <div class="logo">Hybridbots</div>
  <ul class="nav-items">
    <li id="portfolio-btn">Portfólio</li>
    <li id="whatsapp-btn">Whatsapp</li>
    <li id="cart-menu">Carrinho (<span id="cart-count">0</span>)</li>
  </ul>
</header>

<!-- Center Title -->
<div id="center-title">
  <h1 id="main-title">ADQUIRA<br>NOSSOS PROJETOS</h1>
  <p class="sub">Hybridbots</p>
</div>

<!-- Strips -->
<div id="strips"></div>

<!-- Expanded Project View -->
<div id="expanded-view">
  <div id="exp-image"></div>
  <div id="exp-info">
    <div id="exp-count"></div>
    <div id="exp-title"><span id="exp-title-text"></span></div>
    <div id="exp-category"></div>
    <div id="exp-desc"></div>
    <div id="exp-price"></div>
    <button id="exp-add-to-cart">Adicionar ao carrinho</button>
  </div>
  <div id="exp-close">← Fechar</div>
</div>

<!-- Carrinho Sidebar -->
<div id="cart-sidebar">
  <div id="cart-header">
    <span>Seu carrinho</span>
    <span id="cart-close">✕ Fechar</span>
  </div>
  <div id="cart-items"></div>
  <div id="cart-footer">
    <div id="cart-total">
      <span>Total</span>
      <span id="cart-total-value">R$ 0</span>
    </div>
    <button id="cart-checkout">Finalizar compra</button>
  </div>
</div>

<div id="progress"></div>

<script>
// ─────────────────────────────────────────
// DATA (com preço)
// ─────────────────────────────────────────
const projects = [
  {
    title: 'ARCHVAULT',
    category: 'Identidade Visual',
    desc: 'Sistema de identidade para um estúdio de arquitetura contemporânea. Tipografia estrutural, paleta mineral e linguagem de formas geométricas tensionadas.',
    color: '#1a1612',
    hue: '25deg',
    saturation: '15%',
    image: 'imgs/proj_08.webp',
    price: 199.90
  },
  {
    title: 'FLUX STUDIO',
    category: 'Motion & Branding',
    desc: 'Direção de arte para uma plataforma de animação. O conceito explora movimento como matéria-prima criativa, traduzido em um sistema visual dinâmico.',
    color: '#0f1318',
    hue: '210deg',
    saturation: '20%',
    image: 'imgs/proj_10.webp',
    price: 249.90
  },
  {
    title: 'NOIRE',
    category: 'Editorial & Fotografia',
    desc: 'Direção criativa de um editorial de moda minimalista. Composições em alto contraste e espacialidade narrativa que dialoga com a forma e o vazio.',
    color: '#120f12',
    hue: '290deg',
    saturation: '12%',
    image: 'imgs/proj_09.webp',
    price: 179.90
  },
  {
    title: 'TERRAIN',
    category: 'Instalação Interativa',
    desc: 'Projeto de instalação imersiva para um festival de arte digital. WebGL + sensores de profundidade criando topografias reativas em tempo real.',
    color: '#0e1410',
    hue: '140deg',
    saturation: '18%',
    image: 'imgs/proj_04.webp',
    price: 299.90
  },
  {
    title: 'ECHO',
    category: 'Interface & UX',
    desc: 'Design de produto para um aplicativo de meditação e bem-estar sonoro. Microinterações que imitam ritmos respiratórios e frequências biauriculares.',
    color: '#13100f',
    hue: '20deg',
    saturation: '14%',
    image: 'imgs/proj_05.webp',
    price: 219.90
  },
  {
    title: 'CANVAS',
    category: 'Plataforma Digital',
    desc: 'Redesign completo de uma plataforma de criação colaborativa. Foco em acessibilidade, performance e uma linguagem visual que empurra o limite do funcional.',
    color: '#0f0f13',
    hue: '240deg',
    saturation: '16%',
    image: 'imgs/proj_06.webp',
    price: 189.90
  }
];

// ─────────────────────────────────────────
// CARRINHO (estado)
// ─────────────────────────────────────────
let cart = []; // cada item: { id, title, category, image, price, quantity }

function addToCart(project) {
  const existing = cart.find(item => item.id === project.title);
  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({
      id: project.title,
      title: project.title,
      category: project.category,
      image: project.image,
      price: project.price,
      quantity: 1
    });
  }
  updateCartUI();
  openCartSidebar();
}

function removeFromCart(projectTitle) {
  cart = cart.filter(item => item.id !== projectTitle);
  updateCartUI();
}

function updateCartUI() {
  const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
  document.getElementById('cart-count').textContent = totalItems;

  const cartItemsEl = document.getElementById('cart-items');
  if (cart.length === 0) {
    cartItemsEl.innerHTML = '<div id="cart-empty">Seu carrinho está vazio</div>';
  } else {
    let html = '';
    cart.forEach(item => {
      html += `
        <div class="cart-item">
          <div class="cart-item-img" style="background-image: url('${item.image}')"></div>
          <div class="cart-item-info">
            <div class="cart-item-title">${item.title}</div>
            <div class="cart-item-category">${item.category}</div>
            <div class="cart-item-price">R$ ${item.price.toFixed(2)} x ${item.quantity}</div>
            <span class="cart-item-remove" data-id="${item.id}">Remover</span>
          </div>
        </div>
      `;
    });
    cartItemsEl.innerHTML = html;

    document.querySelectorAll('.cart-item-remove').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = e.target.dataset.id;
        removeFromCart(id);
      });
    });
  }

  const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
  document.getElementById('cart-total-value').textContent = `R$ ${total.toFixed(2)}`;
}

// Controle da sidebar
const cartSidebar = document.getElementById('cart-sidebar');
const cartMenu = document.getElementById('cart-menu');
const cartClose = document.getElementById('cart-close');

function openCartSidebar() {
  cartSidebar.classList.add('open');
}
function closeCartSidebar() {
  cartSidebar.classList.remove('open');
}
cartMenu.addEventListener('click', (e) => {
  e.stopPropagation();
  openCartSidebar();
});
cartClose.addEventListener('click', closeCartSidebar);
document.addEventListener('click', (e) => {
  if (!cartSidebar.contains(e.target) && !cartMenu.contains(e.target) && cartSidebar.classList.contains('open')) {
    closeCartSidebar();
  }
});

// ─────────────────────────────────────────
// AÇÕES DOS BOTÕES DO MENU
// ─────────────────────────────────────────
document.getElementById('portfolio-btn').addEventListener('click', () => {
  // Abre o portfólio externo em uma nova aba
  window.open('https://ctrlplayfran.github.io/Portfolio-Hybridbots-Francielly/', '_blank');
});

document.getElementById('whatsapp-btn').addEventListener('click', () => {
  // Link para o WhatsApp (substitua pelo número desejado)
  window.open('https://wa.me/5511999999999', '_blank');
});

// ─────────────────────────────────────────
// CUSTOM CURSOR
// ─────────────────────────────────────────
const cursorDot = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function animateCursor() {
  rx += (mx - rx) * .15; ry += (my - ry) * .15;
  const cursor = document.getElementById('cursor');
  cursor.style.transform = `translate(${mx}px, ${my}px)`;
  cursorRing.style.transform = `translate(${rx - mx - 20}px, ${ry - my - 20}px)`;
  requestAnimationFrame(animateCursor);
}
animateCursor();

// ─────────────────────────────────────────
// BUILD STRIPS
// ─────────────────────────────────────────
const stripsEl = document.getElementById('strips');
let touchTimeout = null;
let currentTouchStrip = null;

const isTouchDevice = 'ontouchstart' in window;

projects.forEach((p, i) => {
  const strip = document.createElement('div');
  strip.className = 'strip';
  strip.dataset.index = i;

  strip.innerHTML = `
    <canvas class="strip-canvas" id="canvas-${i}"></canvas>
    <div class="strip-img" style="background-image: url('${p.image}');"></div>
    <div class="strip-overlay"></div>
    <div class="strip-fill" style="background: linear-gradient(180deg, ${p.color} 0%, #080808 100%);"></div>
    <div class="strip-num">0${i+1}</div>
    <div class="strip-label">
      <h3>${p.title}</h3>
      <p>${p.category}</p>
    </div>
  `;
  stripsEl.appendChild(strip);

  strip.addEventListener('mouseenter', () => document.body.classList.add('hovering-strip'));
  strip.addEventListener('mouseleave', () => document.body.classList.remove('hovering-strip'));

  strip.addEventListener('click', (e) => {
    if (isTouchDevice) return;
    openProject(i);
  });

  if (isTouchDevice) {
    strip.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (currentTouchStrip && currentTouchStrip !== strip) {
        currentTouchStrip.classList.remove('touch-hover');
      }
      strip.classList.add('touch-hover');
      currentTouchStrip = strip;

      if (touchTimeout) clearTimeout(touchTimeout);
      touchTimeout = setTimeout(() => {
        if (currentTouchStrip === strip) {
          openProject(i);
          strip.classList.remove('touch-hover');
          currentTouchStrip = null;
        }
      }, 300);
    }, { passive: false });

    strip.addEventListener('touchmove', (e) => {
      if (touchTimeout) {
        clearTimeout(touchTimeout);
        touchTimeout = null;
      }
      strip.classList.remove('touch-hover');
      if (currentTouchStrip === strip) currentTouchStrip = null;
    });

    strip.addEventListener('touchend', (e) => {
      if (!touchTimeout) {
        strip.classList.remove('touch-hover');
        if (currentTouchStrip === strip) currentTouchStrip = null;
      }
    });

    strip.addEventListener('touchcancel', (e) => {
      if (touchTimeout) {
        clearTimeout(touchTimeout);
        touchTimeout = null;
      }
      strip.classList.remove('touch-hover');
      if (currentTouchStrip === strip) currentTouchStrip = null;
    });
  }
});

// ─────────────────────────────────────────
// WEBGL PER-STRIP
// ─────────────────────────────────────────
function initWebGL(idx) {
  const canvas = document.getElementById(`canvas-${idx}`);
  const gl = canvas.getContext('webgl');
  if (!gl) return;

  const vsrc = `attribute vec2 a_pos; void main(){gl_Position=vec4(a_pos,0.,1.);}`;
  const fsrc = `
    precision mediump float;
    uniform float u_time;
    uniform float u_hue;
    uniform vec2  u_res;
    vec3 hsv2rgb(vec3 c){
      vec4 K=vec4(1.,2./3.,1./3.,3.);
      vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
      return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
    }
    float noise(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float smoothNoise(vec2 p){
      vec2 i=floor(p); vec2 f=fract(p); f=f*f*(3.-2.*f);
      float a=noise(i), b=noise(i+vec2(1,0));
      float c=noise(i+vec2(0,1)), d=noise(i+vec2(1,1));
      return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
    }
    void main(){
      vec2 uv=gl_FragCoord.xy/u_res;
      float n  = smoothNoise(uv*3.+u_time*.12);
      float n2 = smoothNoise(uv*6.-u_time*.08+42.);
      float val = n*.6+n2*.4;
      vec3 col = hsv2rgb(vec3(u_hue+val*.08, .35+val*.2, .05+val*.08));
      gl_FragColor=vec4(col,1.);
    }
  `;

  function compile(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src); gl.compileShader(sh); return sh;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(prog); gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uHue  = gl.getUniformLocation(prog, 'u_hue');
  const uRes  = gl.getUniformLocation(prog, 'u_res');
  const hue = idx / projects.length;

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  let start = performance.now();
  function draw() {
    const t = (performance.now() - start) / 1000;
    gl.uniform1f(uTime, t);
    gl.uniform1f(uHue, hue);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }
  draw();
}

// ─────────────────────────────────────────
// GSAP
// ─────────────────────────────────────────
CustomEase.create('premium', 'M0,0 C0.16,1 0.3,1 1,1');
CustomEase.create('reveal',  'M0,0 C0.25,0.1 0.25,1 1,1');

// ─────────────────────────────────────────
// TITLE SPLIT
// ─────────────────────────────────────────
function splitLetters(el) {
  const text = el.innerText;
  el.innerHTML = '';
  for (const line of text.split('\n')) {
    const div = document.createElement('div');
    div.style.overflow = 'hidden'; div.style.display = 'block';
    for (const ch of line) {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      div.appendChild(span);
    }
    el.appendChild(div);
  }
  return el.querySelectorAll('.char');
}
const titleEl = document.getElementById('main-title');
const chars = splitLetters(titleEl);

// ─────────────────────────────────────────
// EXPAND PROJECT
// ─────────────────────────────────────────
const expView  = document.getElementById('expanded-view');
const expImage = document.getElementById('exp-image');
const expTitle = document.getElementById('exp-title-text');
const expCat   = document.getElementById('exp-category');
const expDesc  = document.getElementById('exp-desc');
const expCount = document.getElementById('exp-count');
const expPrice = document.getElementById('exp-price');
const expAddBtn = document.getElementById('exp-add-to-cart');
let currentProjectIndex = null;
let isExpanded = false;

function openProject(idx) {
  if (isExpanded) return;
  isExpanded = true;
  currentProjectIndex = idx;
  const p = projects[idx];
  expImage.style.backgroundImage = `url('${p.image}')`;
  expTitle.textContent = p.title;
  expCat.textContent   = p.category;
  expDesc.textContent  = p.desc;
  expCount.textContent = `0${idx+1} / 0${projects.length}`;
  expPrice.textContent = `R$ ${p.price.toFixed(2)}`;

  expView.classList.add('active');
  gsap.to(expView, { opacity: 1, duration: .6, ease: 'premium' });

  gsap.to('#exp-title span', { y: '0%', duration: .9, ease: 'reveal', delay: .2 });
  gsap.to([expCount, expCat, expDesc, expPrice, expAddBtn], {
    opacity: 1, y: 0, duration: .6, stagger: .1, delay: .45, ease: 'premium',
    from: { opacity: 0, y: 20 }
  });

  gsap.to('.strip', { flex: '0.6', duration: .7, ease: 'premium' });
  gsap.to('#center-title', { opacity: 0, duration: .3 });
}

document.getElementById('exp-close').addEventListener('click', closeProject);
function closeProject() {
  if (!isExpanded) return;
  gsap.to(expView, { opacity: 0, duration: .5, ease: 'premium', onComplete: () => {
    expView.classList.remove('active');
    isExpanded = false;
    gsap.to('#exp-title span', { y: '100%', duration: 0 });
    gsap.to([expCount, expCat, expDesc, expPrice, expAddBtn], { opacity: 0, duration: 0 });
  }});
  gsap.to('.strip', { flex: '1', duration: .7, ease: 'premium', delay: .1 });
  gsap.to('#center-title', { opacity: 1, duration: .5, delay: .2 });
}

expAddBtn.addEventListener('click', () => {
  if (currentProjectIndex !== null) {
    addToCart(projects[currentProjectIndex]);
    gsap.to(expAddBtn, { scale: 1.1, duration: .2, yoyo: true, repeat: 1 });
  }
});

// ─────────────────────────────────────────
// LOADER → INTRO
// ─────────────────────────────────────────
window.addEventListener('load', () => {
  projects.forEach((_, i) => initWebGL(i));

  const loaderNum = document.getElementById('loader-num');
  const loaderBar = document.getElementById('loader-bar');
  let count = 0;
  const iv = setInterval(() => {
    count += Math.floor(Math.random() * 8) + 4;
    if (count >= 100) { count = 100; clearInterval(iv); startIntro(); }
    loaderNum.textContent = count;
    loaderBar.style.width = count + '%';
  }, 60);
});

function startIntro() {
  const tl = gsap.timeline();
  tl.to('#loader', { opacity: 0, duration: .6, ease: 'premium', delay: .2 })
    .set('#loader', { display: 'none' })
    .fromTo('.strip', { scaleY: 0, transformOrigin: 'bottom' }, {
      scaleY: 1, duration: 1.2, stagger: .08, ease: 'premium'
    }, 0)
    .from(chars, { y: '110%', opacity: 0, duration: .9, stagger: .025, ease: 'reveal' }, .4)
    .from('#center-title .sub', { opacity: 0, y: 10, duration: .6, ease: 'premium' }, 1)
    .from('header', { opacity: 0, y: -20, duration: .6, ease: 'premium' }, .6);
}

// ─────────────────────────────────────────
// MOUSE PARALLAX
// ─────────────────────────────────────────
document.addEventListener('mousemove', e => {
  const dx = (e.clientX / window.innerWidth  - .5) * 18;
  const dy = (e.clientY / window.innerHeight - .5) * 12;
  gsap.to('#center-title', { x: dx, y: dy, duration: 1.2, ease: 'power2.out', overwrite: 'auto' });
});

// Inicializa carrinho
updateCartUI();
</script>
